version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: site2md-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build: .
    container_name: site2md-api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_MAX_CONNECTIONS=20
      - STORAGE_PATH=/data/results
      - MAX_PAGES=200
      - MAX_DEPTH=5
      - MAX_RESPONSE_SIZE=10485760
      - JOB_TIMEOUT=600
      - DOWNLOAD_DELAY=1.0
      - CONCURRENT_REQUESTS=16
      - PLAYWRIGHT_MAX_CONTEXTS=4
      - PLAYWRIGHT_PAGE_TIMEOUT=10000
      - RESULT_TTL_HOURS=24
      - LOG_LEVEL=INFO
      - API_WORKERS=2
    ports:
      - "8088:8088"
    volumes:
      - results:/data/results
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    command:
      - uvicorn
      - site2md.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8088"
      - --workers
      - "2"

  worker:
    build: .
    container_name: site2md-worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_MAX_CONNECTIONS=20
      - STORAGE_PATH=/data/results
      - MAX_PAGES=200
      - MAX_DEPTH=5
      - MAX_RESPONSE_SIZE=10485760
      - JOB_TIMEOUT=600
      - DOWNLOAD_DELAY=1.0
      - CONCURRENT_REQUESTS=16
      - PLAYWRIGHT_MAX_CONTEXTS=4
      - PLAYWRIGHT_PAGE_TIMEOUT=10000
      - RESULT_TTL_HOURS=24
      - LOG_LEVEL=INFO
    volumes:
      - results:/data/results
    restart: unless-stopped
    command:
      - arq
      - site2md.worker.settings.WorkerSettings

volumes:
  redis_data:
  results:
